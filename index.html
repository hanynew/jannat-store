<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- إعدادات بطاقات المعاينة الغنية للروابط (Rich Link Previews) -->
    <meta property="og:title" content="متجر جنات للأناقة والتخفيضات">
    <meta property="og:description" content="وجهتك الأولى لأرقى الأزياء، الإكسسوارات، وملابس الأطفال.">
    <meta property="og:image" content="رابط_صورة_شعار_المتجر.jpg">
    <meta property="og:url" content="رابط_متجرك_على_vercel">
    <meta property="og:type" content="website">

    <title>متجر جنات للأناقة والتخفيضات</title>

    <style>
        /* إعدادات الهوية البصرية */
        :root {
            --off-white: #FAF9F6;
            --beige: #E8D8C8;
            --dusty-pink: #C49A9B;
            --text-dark: #4A4A4A;
        }

        body {
            background-color: var(--off-white);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: var(--beige);
            padding: 40px 20px;
            border-bottom: 2px solid var(--dusty-pink);
        }

        h1 {
            margin: 0;
            color: var(--text-dark);
            font-weight: 400;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: var(--dusty-pink);
            font-size: 1.1em;
            margin-top: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .product-card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: var(--beige);
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .buy-button {
            display: inline-block;
            background-color: var(--dusty-pink);
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 15px;
            transition: opacity 0.3s ease;
        }

        .buy-button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h1>متجر جنات للأناقة والتخفيضات</h1>
        <p class="subtitle">أرقى الأزياء، الإكسسوارات، وملابس الأطفال</p>
    </header>

    <div class="container">
        <div class="products-grid">

            <!-- المنتج الأول (أزياء) مع ربط مباشر للقطعة -->
            <div class="product-card" id="fashion-item-1">
                <div class="product-image"></div>
                <h3>فستان أنيق</h3>
                <p>فستان بتصميم عصري وخامة ممتازة.</p>
                <a href="#fashion-item-1" class="buy-button">التفاصيل والطلب</a>
            </div>

            <!-- المنتج الثاني (إكسسوارات) مع ربط مباشر للقطعة -->
            <div class="product-card" id="accessory-item-1">
                <div class="product-image"></div>
                <h3>طقم إكسسوار فاخر</h3>
                <p>يضفي لمسة من الجمال على إطلالتك.</p>
                <a href="#accessory-item-1" class="buy-button">التفاصيل والطلب</a>
            </div>

            <!-- المنتج الثالث (أطفال) مع ربط مباشر للقطعة -->
            <div class="product-card" id="kids-item-1">
                <div class="product-image"></div>
                <h3>طقم أطفال قطني</h3>
                <p>مريح وأنيق لأطفالك.</p>
                <a href="#kids-item-1" class="buy-button">التفاصيل والطلب</a>
            </div>

        </div>
    </div>

</body>
</html>
