<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="متجر جنات للأناقة والتخفيضات">
    <meta property="og:description" content="وجهتك الأولى لأرقى الأزياء، الإكسسوارات، وملابس الأطفال.">
    <meta property="og:image" content="https://jannat-store.vercel.app/dress.jpg">
    <meta property="og:type" content="website">

    <title>متجر جنات للأناقة والتخفيضات</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --off-white: #FAF9F6;
            --beige: #E8D8C8;
            --dusty-pink: #C49A9B;
            --dusty-pink-dark: #a67c7d;
            --text-dark: #333333;
        }

        body {
            background-color: var(--off-white);
            color: var(--text-dark);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        header {
            background: rgba(232, 216, 200, 0.85);
            backdrop-filter: blur(10px);
            padding: 50px 20px;
            border-bottom: 2px solid var(--dusty-pink);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin: 0;
            color: var(--text-dark);
            font-weight: 800;
            font-size: 2.5em;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        p.subtitle {
            color: var(--dusty-pink-dark);
            font-size: 1.2em;
            font-weight: 500;
            margin-top: 15px;
        }

        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding-bottom: 50px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            border: 1px solid rgba(232, 216, 200, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: right;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(196, 154, 155, 0.15);
            border-color: var(--dusty-pink);
        }

        .image-frame {
            padding: 8px;
            background: var(--off-white);
            border-radius: 15px;
            border: 2px dashed var(--beige);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-title {
            font-size: 1.4em;
            margin: 10px 0;
            color: var(--text-dark);
            font-weight: 700;
        }

        .product-desc {
            font-size: 1em;
            color: #666;
            line-height: 1.7;
        }

        .product-price {
            font-weight: 800;
            color: var(--dusty-pink-dark);
            font-size: 1.4em;
            margin: 20px 0 15px 0;
            display: inline-block;
            background: var(--off-white);
            padding: 5px 15px;
            border-radius: 10px;
        }

        .buy-button {
            display: block;
            background: linear-gradient(135deg, #d8acae, #C49A9B);
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 6px 0 var(--dusty-pink-dark), 0 10px 20px rgba(196, 154, 155, 0.4), inset 0 2px 0 rgba(255,255,255,0.3);
            transition: all 0.2s ease;
        }

        .buy-button:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--dusty-pink-dark), 0 5px 10px rgba(196, 154, 155, 0.4);
        }

        .buy-button:hover {
            filter: brightness(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>متجر جنات للأناقة والتخفيضات</h1>
        <p class="subtitle">أرقى الأزياء، الإكسسوارات، وملابس الأطفال</p>
    </header>

    <div class="container">
        <div class="products-grid" id="store-products"></div>
    </div>

    <script>
        // بروتوكول المعالجة الديناميكية لجلب وعرض البيانات
        const whatsappNumber = "966500000000"; // قم بتحديثه برقم الاتصال الفعلي

        fetch('products.json')
            .then(response => response.json())
            .then(products => {
                const productsContainer = document.getElementById('store-products');
                
                products.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    // إضافة تأخير زمني متسلسل لحركة الظهور (Fade Up)
                    card.style.animationDelay = (index * 0.15) + 's'; 
                    
                    card.innerHTML = `
                        <div class="image-frame">
                            <img src="${product.image}" alt="${product.title}" class="product-image">
                        </div>
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-desc">${product.desc}</p>
                        <div class="product-price">${product.price}</div>
                        <a href="https://wa.me/${whatsappNumber}?text=${product.whatsapp_message}" target="_blank" class="buy-button">الطلب السريع عبر واتساب</a>
                    `;
                    
                    productsContainer.appendChild(card);
                });
            })
            .catch(error => console.error('System Error - Data Fetching Failed:', error));
    </script>

</body>
</html>
